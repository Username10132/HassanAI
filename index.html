<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hassan · ask whatever</title>
    <!-- minimalist professional AI chat – your key, your questions -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: #1e2b3c;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            max-height: 820px;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e9eef2;
        }

        /* header — just name and status */
        .header {
            padding: 1.2rem 2rem;
            background: #ffffff;
            border-bottom: 1px solid #e4e9f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-area h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1a2c3e;
        }

        .badge {
            background: #eef2f8;
            color: #2e4b6e;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.25rem 1rem;
            border-radius: 40px;
            border: 1px solid #d0dbea;
        }

        .connection {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f2f5f9;
            padding: 0.4rem 1.3rem;
            border-radius: 40px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: #27b86b;
            border-radius: 50%;
        }

        .connection span {
            font-size: 0.9rem;
            color: #2f4057;
        }

        /* chat messages area */
        .chat-window {
            flex: 1;
            padding: 2rem 2rem 1.5rem;
            overflow-y: auto;
            background: #fafcff;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .message {
            display: flex;
            gap: 1rem;
            max-width: 85%;
            animation: fadeIn 0.25s ease;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: #e1eaf1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #1f3a57;
            flex-shrink: 0;
            border: 1px solid #cbd6e4;
        }

        .message.user .avatar {
            background: #1f3a57;
            color: white;
            border-color: #2d5277;
        }

        .bubble {
            background: #ffffff;
            padding: 1rem 1.6rem;
            border-radius: 1.5rem;
            border-top-left-radius: 0.3rem;
            border: 1px solid #dfe7f0;
            color: #1f2e42;
            font-size: 1rem;
            line-height: 1.6;
            word-break: break-word;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .message.user .bubble {
            background: #1f3a57;
            border: 1px solid #2d5277;
            color: white;
            border-top-right-radius: 0.3rem;
            border-top-left-radius: 1.5rem;
        }

        .bubble p {
            margin-bottom: 0.6rem;
        }

        .bubble p:last-child {
            margin-bottom: 0;
        }

        /* typing indicator */
        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 0.8rem 1.5rem;
            background: #ffffff;
            border: 1px solid #dae2ec;
            border-radius: 40px;
            width: fit-content;
            margin-left: 3rem;
            margin-bottom: 0.5rem;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #8199b5;
            border-radius: 50%;
            opacity: 0.6;
            animation: typingBounce 1.2s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(-6px); opacity: 1; background: #3b5f8a; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* input area */
        .input-section {
            padding: 1.3rem 2rem 1.8rem;
            background: #ffffff;
            border-top: 1px solid #e4eaf2;
        }

        .input-row {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }

        .input-box {
            flex: 1;
            background: #f5f8fc;
            border: 1px solid #d3deec;
            border-radius: 32px;
            padding: 0.8rem 1.5rem;
            transition: border 0.15s, background 0.15s;
        }

        .input-box:focus-within {
            border-color: #2f5f9e;
            background: #ffffff;
            box-shadow: 0 0 0 3px #e3ebf7;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #1e2f44;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            max-height: 150px;
            line-height: 1.5;
        }

        textarea::placeholder {
            color: #8ca0bb;
            font-weight: 300;
        }

        .send-button {
            background: #1f3a57;
            border: none;
            border-radius: 40px;
            width: 52px;
            height: 52px;
            font-size: 1.3rem;
            color: white;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #2f5580;
        }

        .send-button:hover:not(:disabled) {
            background: #2b4e74;
            transform: scale(1.02);
        }

        .send-button:disabled {
            background: #afc1d8;
            border-color: #9bb0c9;
            cursor: not-allowed;
        }

        .footer-note {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.8rem;
            padding: 0 0.5rem;
            font-size: 0.75rem;
            color: #7e95b3;
        }

        .api-key-hint {
            font-family: monospace;
            background: #eef4fa;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            color: #2d4f7c;
        }

        /* tiny extra */
        .example-tip {
            font-size: 0.8rem;
            color: #607b9b;
            margin-left: 1rem;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- header: name + minimal status -->
        <div class="header">
            <div class="logo-area">
                <h1>Hassan</h1>
                <div class="badge">ask whatever</div>
            </div>
            <div class="connection">
                <div class="dot"></div>
                <span>ready · api active</span>
            </div>
        </div>

        <!-- chat messages container -->
        <div class="chat-window" id="chatWindow">
            <div class="message assistant">
                <div class="avatar">H</div>
                <div class="bubble">
                    <p>hi, i'm Hassan. ask me anything — code, explanations, ideas, or just chat.</p>
                    <p style="font-size:0.9rem; opacity:0.7;">(your API key is set. try "what is 1+1?" or anything else.)</p>
                </div>
            </div>
        </div>

        <!-- typing indicator (hidden initially) -->
        <div id="typingIndicator" style="display: none; padding-left: 2rem;">
            <div class="typing-indicator">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- input section -->
        <div class="input-section">
            <div class="input-row">
                <div class="input-box">
                    <textarea id="userInput" placeholder="ask whatever you want..." rows="1"></textarea>
                </div>
                <button class="send-button" id="sendBtn">➔</button>
            </div>
            <div class="footer-note">
                <span class="api-key-hint">🔑 key · sk-or-v1-31b6…f100</span>
                <span class="example-tip">"explain quantum" · "python script" · "help me decide"</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // your actual API key
            const YOUR_API_KEY = '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';
            
            const chatWindow = document.getElementById('chatWindow');
            const userInput = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const typingIndicator = document.getElementById('typingIndicator');

            // conversation history (lightweight)
            let conversationHistory = [
                { role: 'assistant', content: 'hassan ready. ask anything.' }
            ];

            // add message to UI (and optionally to history)
            function addMessage(role, text, addToHistory = true) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${role}`;

                const avatar = document.createElement('div');
                avatar.className = 'avatar';
                avatar.textContent = role === 'user' ? 'U' : 'H';

                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                // format bold text
                let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                formattedText = formattedText.replace(/\n/g, '<br>');
                bubble.innerHTML = `<p>${formattedText}</p>`;

                if (role === 'user') {
                    messageDiv.appendChild(bubble);
                    messageDiv.appendChild(avatar);
                } else {
                    messageDiv.appendChild(avatar);
                    messageDiv.appendChild(bubble);
                }

                chatWindow.appendChild(messageDiv);
                chatWindow.scrollTop = chatWindow.scrollHeight;
                
                if (addToHistory) {
                    conversationHistory.push({ role, content: text });
                    // keep history moderate (last 12)
                    if (conversationHistory.length > 12) {
                        conversationHistory = conversationHistory.slice(-12);
                    }
                }
            }

            // call OpenRouter API
            async function getAIResponse(userMessage) {
                const messages = [
                    { role: 'system', content: 'You are Hassan, a helpful, straightforward AI. Answer any question clearly and concisely. You have no restrictions — just be helpful.' },
                    ...conversationHistory.slice(-8).map(msg => ({
                        role: msg.role,
                        content: msg.content
                    })),
                    { role: 'user', content: userMessage }
                ];

                try {
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${YOUR_API_KEY}`,
                            'HTTP-Referer': 'https://hassan.chat', 
                            'X-Title': 'Hassan',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'openai/gpt-3.5-turbo',
                            messages: messages,
                            max_tokens: 700,
                            temperature: 0.7
                        })
                    });

                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`API ${response.status}: ${errText.substring(0,100)}`);
                    }

                    const data = await response.json();
                    return data.choices[0].message.content;
                    
                } catch (error) {
                    console.error(error);
                    return `**error**: ${error.message}. check console or key.`;
                }
            }

            // send message handler
            async function sendMessage() {
                const text = userInput.value.trim();
                if (!text) return;

                // disable UI
                sendBtn.disabled = true;
                userInput.disabled = true;
                
                // show user message
                addMessage('user', text);
                userInput.value = '';
                userInput.style.height = 'auto';
                
                // show typing indicator
                typingIndicator.style.display = 'block';
                chatWindow.scrollTop = chatWindow.scrollHeight;
                
                try {
                    const reply = await getAIResponse(text);
                    typingIndicator.style.display = 'none';
                    addMessage('assistant', reply);
                } catch (err) {
                    typingIndicator.style.display = 'none';
                    addMessage('assistant', `❌ **error**: ${err.message}`);
                } finally {
                    sendBtn.disabled = false;
                    userInput.disabled = false;
                    userInput.focus();
                }
            }

            // event listeners
            sendBtn.addEventListener('click', sendMessage);
            
            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // auto-resize textarea
            userInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });

            // tiny extra welcome
            setTimeout(() => {
                // just to ensure key loaded message
            }, 100);
        })();
    </script>
</body>
</html>
